env:
  ts: 0.01
  num_envs: 500
  num_threads: 26
  delay_time: 0.00  
  add_noise: 1
rl:
# 普通型reward
  # pos_coeff: -0.1        # reward coefficient for position 
  # ori_coeff: -0.02        # reward coefficient for orientation
  # lin_vel_coeff: -0.01   # reward coefficient for linear velocity
  # ang_vel_coeff: -0.01   # reward coefficient for angular velocity
  # act_coeff: -0.000001  # reward coefficient for control actions -0.001

# exp型reward
  pos_coeff: 1.0        # reward coefficient for position 
  ori_coeff: 0.1        # reward coefficient for orientation
  lin_vel_coeff: 0.1   # reward coefficient for linear velocity
  ang_vel_coeff: 0.1   # reward coefficient for angular velocity
  act_coeff: 0.000001  # reward coefficient for control actions -0.001

  max_ep_len: 2000